# ==============================================================================
#  rd_bios_tool.conf - Configuration file for rd_bios_tool
# ==============================================================================
#
#  This file is sourced by rd_bios_script.sh at startup.
#  Edit the values below to match your system if the defaults are incorrect.
#
#  Lines beginning with # are comments and are ignored by the script.
#  Do not add quotes around values unless the path contains spaces.
#
# ==============================================================================


# ------------------------------------------------------------------------------
#  RETRODECK INSTALLATION PATHS
# ------------------------------------------------------------------------------

# Location of the RetroDECK component_manifest.json files.
# This is the directory the script scans to build the combined BIOS manifest.
# Default is the standard RetroDECK flatpak installation path.
RD_MANIFEST_SOURCE="/var/lib/flatpak/app/net.retrodeck.retrodeck/current/active/files/retrodeck/components"

# Location of the live RetroDECK directory on your system.
# This is where files are copied during Step 11 (optional live population).
# This path is also used by the Step 13 cleanup safety check to prevent the
# staging folder from ever being mistaken for the live directory and deleted.
# Default is the standard RetroDECK user data directory.
RD_LIVE_DIR="$HOME/retrodeck"

# RetroDECK version this tool was built and tested against.
# This value is displayed in the version warning at startup.
RD_TESTED_VERSION="0.10.6b"


# ------------------------------------------------------------------------------
#  RETRODECK INTERNAL PATH VARIABLES
# ------------------------------------------------------------------------------
#
#  These define how RetroDECK path tokens in the manifests map to real folders
#  inside the retrodeck/ staging directory.
#
#  For example, a manifest entry with:
#    "paths": "$bios_path/dc"
#  will be placed at:
#    retrodeck/bios/dc/
#
#  Only change these if RetroDECK has changed its internal folder names.

RD_BIOS_FOLDER="bios"
RD_SAVES_FOLDER="saves"
RD_ROMS_FOLDER="roms"


# ------------------------------------------------------------------------------
#  TOOL OUTPUT PATHS
# ------------------------------------------------------------------------------

# These are all relative to the rd_bios_tool folder by default.
# You can set absolute paths here if you prefer outputs elsewhere.

# Location of the combined manifest JSON output
RD_MANIFEST_OUTPUT="$TOOL_DIR/combined_manifest.json"

# Location and filename of rd_bios_set.zip
RD_BIOS_ZIP="$TOOL_DIR/rd_bios_set.zip"

# Location of the retrodeck/ staging output folder
RD_STAGING_DIR="$TOOL_DIR/retrodeck"

# Directory where the CSV report is saved
RD_REPORT_DIR="$TOOL_DIR"

# Folder where files that failed MD5 hash checks are saved (Step 10, optional)
# These are files whose filename matched the manifest but whose hash did not.
RD_FAILED_HASH_DIR="$TOOL_DIR/failed_hash_checks"

# ==============================================================================
